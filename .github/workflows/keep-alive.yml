name: Keep Supabase Active

on:
  schedule:
    # Runs every 5 days at 00:00 UTC
    - cron: '0 0 */5 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Database
        run: |
          echo "🔄 Pinging database to keep it active..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://aslamra.vercel.app/api/ping)
          
          if [ $response -eq 200 ]; then
            echo "✅ Database ping successful (HTTP $response)"
          else
            echo "⚠️ Database ping returned HTTP $response"
          fi
          
      - name: Log Timestamp
        run: echo "📅 Pinged at $(date)"
